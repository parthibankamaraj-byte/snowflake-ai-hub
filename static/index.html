<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive Resume Chatbot</title>
    <style>
      :root{
        /* Light professional palette */
        --bg:#f6f7fb; --panel:#ffffff; --panel-2:#f9fafc; --border:#e4e7ef;
        --text:#0f1a2c; --muted:#60708f; --accent:#2563eb; --accent-2:#3b82f6;
        --danger:#ef4444; --bubble-user:#e9f0ff; --bubble-ai:#f1f5ff;
        --shadow:0 10px 30px rgba(16,24,40,.08);
      }
      *{box-sizing:border-box}
      body{margin:0;background:var(--bg);color:var(--text);font-family:Inter, ui-sans-serif, system-ui, Segoe UI, Roboto, Arial}
      header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;padding:16px 20px;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
      header img{width:44px;height:44px;border-radius:50%;object-fit:cover;box-shadow:var(--shadow)}
      header .title{display:flex;flex-direction:column}
      header .title h1{font-size:18px;margin:0;font-weight:600}
      header .title span{font-size:12px;color:var(--muted)}
      .container{display:grid;grid-template-columns:360px 1fr;gap:18px;padding:18px;max-width:1400px;margin:0 auto}
      .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
      .card h3{margin:2px 0 8px 0;font-size:14px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
      .pill{display:inline-flex;align-items:center;gap:8px;background:#eef2ff;border:1px solid var(--border);border-radius:999px;padding:8px 12px;color:var(--muted)}
      .chat{display:flex;flex-direction:column;height:calc(100vh - 140px)}
      .messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
      .msg{display:flex;gap:10px;align-items:flex-start}
      .msg .bubble{max-width:80%;padding:12px 14px;border-radius:14px;border:1px solid var(--border)}
      .msg.user{justify-content:flex-end}
      .msg.user .bubble{background:var(--bubble-user)}
      .msg.ai .bubble{background:var(--bubble-ai)}
      .msg .role{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:rgba(255,255,255,.03);font-size:12px;color:var(--muted)}
      .sources{font-size:12px;color:var(--muted);margin-top:6px}
      .input{display:flex;gap:10px;padding:10px;background:#fafbff;border-top:1px solid var(--border);border-radius:0 0 14px 14px}
      input[type="text"]{flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:#ffffff;color:var(--text);outline:none}
      input[type="text"]::placeholder{color:#9aa6bf}
      button{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:0;border-radius:10px;padding:10px 14px;cursor:pointer;box-shadow:0 6px 18px rgba(37,99,235,.35);transition:transform .05s ease}
      button:active{transform:translateY(1px)}
      button.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
      button:disabled{opacity:.6;cursor:not-allowed}
      a{color:var(--muted);text-decoration:none}
      footer{padding:10px 20px;color:var(--muted);text-align:center}
      @media (max-width: 980px){.container{grid-template-columns:1fr;height:auto}.chat{height:calc(100vh - 340px)}}
    </style>
  </head>
  <body>
    <header>
      <img src="/logo.png" alt="Profile" onerror="this.style.display='none'" />
      <div class="title">
        <h1>Resume Assistant</h1>
        <span>Snowflake • dbt • ETL • AI Projects</span>
      </div>
    </header>
    <div class="container">
      <div class="card">
        <h3>Resume</h3>
        <p style="margin-top:8px; font-size: 13px; color:#b5c0ff">The resume is preloaded from the knowledge folder.</p>
        <div style="margin-top:12px; display:flex; gap:8px">
          <a href="/download/resume"><button>Download PDF Resume</button></a>
          <a href="#" id="viewTop">View Top Questions</a>
        </div>
        <div id="topq" style="margin-top:8px; font-size:13px"></div>
      </div>
      <div class="card chat">
        <div id="messages" class="messages"></div>
        <div class="input">
          <input id="q" type="text" placeholder="Ask about my Snowflake, dbt, ETL or AI initiatives..." />
          <button id="ask" title="Send">Ask</button>
        </div>
      </div>
    </div>
    <footer>
      © Your Name • Interactive Resume Chatbot
    </footer>
    <script>
      const messages = document.getElementById('messages');
      const askBtn = document.getElementById('ask');
      const qInput = document.getElementById('q');
      const topDiv = document.getElementById('topq');
      const viewTop = document.getElementById('viewTop');

      function addMessage(role, text, sources=[]) {
        const row = document.createElement('div');
        row.className = 'msg ' + (role === 'You' ? 'user' : 'ai');
        const avatar = document.createElement('div');
        avatar.className = 'role';
        avatar.textContent = role === 'You' ? 'You' : 'AI';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        row.appendChild(role === 'You' ? bubble : avatar);
        row.appendChild(role === 'You' ? avatar : bubble);
        messages.appendChild(row);
        if (sources.length) {
          const s = document.createElement('div');
          s.className = 'sources';
          s.textContent = 'Sources: ' + sources.join(', ');
          messages.appendChild(s);
        }
        messages.scrollTop = messages.scrollHeight;
      }

      askBtn.onclick = async () => {
        const q = qInput.value.trim();
        if (!q) return;
        addMessage('You', q);
        askBtn.disabled = true;
        try {
          const res = await fetch('/api/chat', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q, top_k: 5 })
          });
          const data = await res.json();
          addMessage('Assistant', data.answer, data.sources || []);
        } catch (e) {
          addMessage('Assistant', 'Error: ' + e.message);
        } finally {
          askBtn.disabled = false;
          qInput.value = '';
        }
      };

      // Ingestion UI removed per request; resume served from knowledge folder

      viewTop.onclick = async (e) => {
        e.preventDefault();
        const res = await fetch('/api/stats/top-questions');
        const data = await res.json();
        topDiv.innerHTML = (data.top || []).map(([q,c],i)=> `${i+1}. ${q} (${c})`).join('<br/>');
      }
    </script>
  </body>
</html>
